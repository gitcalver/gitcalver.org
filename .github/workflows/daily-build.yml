name: Daily site rebuild
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
permissions: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  rebuild:
    name: Rebuild
    # Scope the Cloudflare deploy-hook secret to a dedicated environment, which
    # (on a public repo) is restricted to the default branch the schedule runs on.
    environment: production
    runs-on: ubuntu-latest
    steps:
      - run: curl -fsX POST "$CF_DEPLOY_HOOK"
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}

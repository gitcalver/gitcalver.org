name: Check
on:
  push:
  pull_request:
permissions:
  contents: read
concurrency:
  group:
    ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref ||
    github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv python install
      - run: make check-toolchain
      # Prettier comes from package-lock.json; Ruff and ty come from uv.lock.
      # This is the same `make lint` the pre-commit hook runs locally.
      - run: make lint

  fonts:
    name: Fonts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv python install
      # Builds the site (catching template errors), byte-compares a clean
      # regeneration, and proves font and favicon tampering is detected.
      - run: make check-fonts
      # Asserts the rendered HTML keeps the go-import vanity tags, the /go
      # redirect, and the robots.txt content signal (formerly the CF worker).
      - run: make check-html
      # Fails if the rendered code samples emit a Modus-colored Chroma token
      # the trimmed syntax theme in main.css no longer styles.
      - run: make check-css

  worker:
    name: Worker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # Exercises the rendered site through the package-lock-pinned Wrangler
      # runtime, including canonical routes, redirects, response headers,
      # metadata, the social card, the custom 404, and RSS removal.
      - run: make check-worker check-metadata

  accessibility:
    name: Accessibility
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # The Playwright package and its Chromium build are both selected by the
      # package lock; --with-deps supplies the runner's native browser libraries.
      - run: node_modules/.bin/playwright install --with-deps chromium
      # Covers every rendered page type (including the 404) at 320px and
      # desktop widths in both color modes, then exercises copy outcomes, TOCs,
      # scrollspy, keyboard-accessible overflow, and the UTC date rollover.
      - run: make check-accessibility check-interactions

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # Builds the site and audits it with the package-lock-pinned Lighthouse CI
      # and the runner’s Google Chrome; see lighthouserc.cjs for page coverage.
      - run: make lighthouse

name: Check
on:
  push:
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv python install
      - run: make check-toolchain
      # Prettier comes from package-lock.json; Ruff and ty come from uv.lock.
      # This is the same `make lint` the pre-commit hook runs locally.
      - run: make lint

  fonts:
    name: Fonts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv python install
      # Builds the site (catching template errors) and fails if the committed
      # subsetted fonts don't cover every glyph the rendered HTML uses.
      - run: make check-fonts
      # Asserts the rendered HTML keeps the go-import vanity tags, the /go
      # redirect, and the robots.txt content signal (formerly the CF worker).
      - run: make check-html
      # Fails if the rendered code samples emit a Modus-colored Chroma token
      # the trimmed syntax theme in main.css no longer styles.
      - run: make check-css

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      # Builds the site and audits it with the package-lock-pinned Lighthouse CI
      # and the runner’s Google Chrome; see lighthouserc.cjs for page coverage.
      - run: make lighthouse

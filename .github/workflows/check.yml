name: Check
on:
  push:
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      # Prettier (Markdown) runs via the runner's preinstalled Node; Ruff + ty
      # via uv. Same `make lint` the pre-commit hook runs locally.
      - run: make lint

  fonts:
    name: Fonts
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
      # Builds the site (catching template errors) and fails if the committed
      # subsetted fonts don't cover every glyph the rendered HTML uses.
      - run: make check-fonts
      # Asserts the rendered HTML keeps the go-import vanity tags, the /go
      # redirect, and the robots.txt content signal (formerly the CF worker).
      - run: make check-html
      # Fails if the rendered code samples emit a Modus-colored Chroma token
      # the trimmed syntax theme in main.css no longer styles.
      - run: make check-css

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      # Builds the site and audits it against lighthouse:recommended. lhci runs
      # via the runner's preinstalled Node (npx) and Google Chrome; see
      # lighthouserc.cjs for the page list and assertion overrides.
      - run: make lighthouse

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}gitcalver{{ else }}{{ .Title }} — gitcalver{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Deterministic version numbers from git history{{ end }}">
  <meta name="go-import" content="gitcalver.org/go git https://github.com/gitcalver/go">
  <meta name="go-source" content="gitcalver.org/go https://github.com/gitcalver/go https://github.com/gitcalver/go/tree/main{/dir} https://github.com/gitcalver/go/blob/main{/dir}/{file}#L{line}">
  <link rel="stylesheet" href="/css/style.css">
  {{- $n := now.UTC -}}
  <meta name="gcv-build" content="{{ $n.Format "20060102" }}" data-yesterday="{{ ($n.AddDate 0 0 -1).Format "20060102" }}">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="/" class="site-title">gitcalver</a>
      <ul>
        <li><a href="/getting-started/">Getting Started</a></li>
        <li><a href="/spec/">Specification</a></li>
        <li><a href="https://github.com/gitcalver" rel="noopener">GitHub</a> · <a href="https://codeberg.org/gitcalver" rel="noopener">Codeberg</a></li>
      </ul>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>gitcalver.org is licensed under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>.</p>
  </footer>
  {{ with getenv "CF_ANALYTICS_TOKEN" }}
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token": "{{ . }}"}'></script>
  {{ end }}
</body>
</html>

baseURL = "https://gitcalver.org/"
title = "gitcalver"
locale = "en-us"

disableKinds = ["taxonomy", "term"]

[markup.highlight]
noClasses = false
lineNos = false
guessSyntax = false

[markup.goldmark.renderer]
unsafe = true

# Allow the Cloudflare analytics token to be read at build time; the default
# getenv allowlist only covers HUGO_* and CI.
[security.funcs]
getenv = ['^HUGO_', '^CI$', '^CF_ANALYTICS_TOKEN$']
